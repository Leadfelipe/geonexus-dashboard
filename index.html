<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Geonexus Intermodal 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f5f5f3;color:#1a1a18}
.page{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}
h1{font-size:20px;font-weight:600}
.sub{font-size:13px;color:#73726c;margin-top:3px}

.sb{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#EAF3DE;border-radius:8px;margin-bottom:1rem;font-size:12px;color:#3B6D11;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;background:#3B6D11}

button{
  padding:8px 12px;
  border:1px solid #cfcdbf;
  background:#fff;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
}

.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin:1.25rem 0}

.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:1.25rem 0}

.met{background:#fff;border-radius:10px;padding:16px;border:1px solid #e8e7e0}
.met-val{font-size:26px}

.charts{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.card{background:#fff;border:1px solid #e8e7e0;border-radius:12px;padding:1rem}

.tbl-card{background:#fff;border:1px solid #e8e7e0;border-radius:12px;padding:1rem;margin-top:14px}

table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #eee}

@media(max-width:700px){
.metrics{grid-template-columns:1fr 1fr}
.charts{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="page">

<h1>Dashboard Intermodal 2026</h1>
<p class="sub">Geonexus + Lead Gestão Fundiária</p>

<div class="sb">
  <span class="dot"></span>
  <span id="st">Carregando dados...</span>
  <span style="margin-left:auto;font-size:11px" id="lu"></span>

  <button id="btnRefresh" onclick="manualRefresh()">
    Atualizar agora
  </button>
</div>

<div class="metrics">
<div class="met"><p>Total</p><p id="m1" class="met-val">-</p></div>
<div class="met"><p>Empresas</p><p id="m2" class="met-val">-</p></div>
<div class="met"><p>Leads quentes</p><p id="m3" class="met-val">-</p></div>
<div class="met"><p>Média</p><p id="m4" class="met-val">-</p></div>
</div>

<div class="charts">
<div class="card"><canvas id="c1"></canvas></div>
<div class="card"><canvas id="c2"></canvas></div>
<div class="card"><canvas id="c3"></canvas></div>
<div class="card"><canvas id="c4"></canvas></div>
</div>

<div class="tbl-card">
<table>
<thead>
<tr>
<th>Nome</th>
<th>Empresa</th>
<th>Interesses</th>
<th>Dores</th>
<th>Temp</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

</div>

<script>

var DATA=[];
var CH={};

var IL={
  ferroviaria:'Ferroviário',
  aeroportuaria:'Aeroportuário',
  energia:'Energia',
  oleo_gas:'Óleo e Gás'
};

var DL={
  Faixa_de_Dominio:'Faixa de Domínio',
  Gestao_Fundiaria:'Gestão Fundiária'
};

function normList(v){
  if(!v) return [];
  return v.split(',').map(x=>x.trim()).filter(Boolean);
}

function manualRefresh(){
  var btn=document.getElementById('btnRefresh');
  btn.disabled=true;
  btn.textContent="Atualizando...";

  load().finally(()=>{
    btn.disabled=false;
    btn.textContent="Atualizar agora";
  });
}

async function load(){
  try{
    var r=await fetch('data.json?t='+Date.now());
    var q=await r.json();

    DATA=(q.features||[]).map(f=>f.attributes);

    render();

    document.getElementById('st').textContent=DATA.length+" respostas";
    document.getElementById('lu').textContent=new Date().toLocaleTimeString();

  }catch(e){
    document.getElementById('st').textContent="Erro ao carregar";
  }
}

function countMulti(field,map){
  var c={};

  DATA.forEach(r=>{
    normList(r[field]).forEach(k=>{
      var l=map[k]||k;
      c[l]=(c[l]||0)+1;
    });
  });

  return c;
}

function render(){

  document.getElementById('m1').textContent=DATA.length;

  document.getElementById('m2').textContent=
    new Set(DATA.map(r=>r.nome_e_empresa_informe_seu_nome)).size;

  var quente=DATA.filter(r=>Number(r.temperatura_estrelas_avalie_seu)==3).length;
  document.getElementById('m3').textContent=quente;

  var media=DATA.map(r=>Number(r.temperatura_estrelas_avalie_seu))
    .reduce((a,b)=>a+b,0)/DATA.length;

  document.getElementById('m4').textContent=media.toFixed(1);

  var i=countMulti('interesse_principal',IL);
  draw('c1',i,'bar','#378ADD');

  var d=countMulti('principal_dor',DL);
  draw('c3',d,'bar','#1D9E75');

  var t={1:0,2:0,3:0};
  DATA.forEach(r=>t[r.temperatura_estrelas_avalie_seu]++);
  draw('c2',t,'doughnut',['#ccc','#f90','#f30']);

  var dias={'Dia1':0,'Dia2':0,'Dia3':0};
  DATA.forEach(r=>{
    var d=new Date(r.CreationDate).getDate();
    if(d==14)dias.Dia1++;
    if(d==15)dias.Dia2++;
    if(d==16)dias.Dia3++;
  });
  draw('c4',dias,'bar','#7F77DD');

  document.getElementById('tb').innerHTML=
    DATA.slice().reverse().slice(0,10).map(r=>`
      <tr>
        <td>${r.nome||''}</td>
        <td>${r.nome_e_empresa_informe_seu_nome||''}</td>
        <td>${normList(r.interesse_principal).map(x=>IL[x]||x).join(', ')}</td>
        <td>${normList(r.principal_dor).map(x=>DL[x]||x).join(', ')}</td>
        <td>${r.temperatura_estrelas_avalie_seu}</td>
      </tr>
    `).join('');
}

function draw(id,obj,type,color){
  if(CH[id]) CH[id].destroy();

  CH[id]=new Chart(document.getElementById(id),{
    type:type,
    data:{
      labels:Object.keys(obj),
      datasets:[{
        data:Object.values(obj),
        backgroundColor:Array.isArray(color)?color:Object.keys(obj).map(()=>color)
      }]
    },
    options:{responsive:true}
  });
}

load();
setInterval(load,60000);

</script>
</body>
</html>
