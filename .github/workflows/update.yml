name: Update Survey Data

on:
  repository_dispatch:
    types: [survey_submitted]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Buscar dados ArcGIS
        env:
          API_KEY: ${{ secrets.ARCGIS_TOKEN }}
        run: |
          ITEM_ID="9fdd86b885a84f7faf0b6434bc626ccd"
          SVC_URL=$(curl -s "https://www.arcgis.com/sharing/rest/content/items/${ITEM_ID}?f=json&token=${API_KEY}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['url'])")
          curl -s "${SVC_URL}/0/query?where=1%3D1&outFields=*&f=json&token=${API_KEY}&resultRecordCount=2000" -o data.json
          echo "Total: $(python3 -c "import json; print(len(json.load(open('data.json')).get('features',[])))")"

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update survey data"
          git push
