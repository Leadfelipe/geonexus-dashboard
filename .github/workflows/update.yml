name: Update Survey Data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Buscar dados ArcGIS
        run: |
          curl -s "https://services3.arcgis.com/ba17q0p2zHwzRK3B/arcgis/rest/services/survey123_08566a11039c49e38326d98785c0ee7e_results/FeatureServer/0/query?where=1%3D1&outFields=*&f=json&resultRecordCount=2000" -o data.json

          echo "Primeiros 500 caracteres:"
          head -c 500 data.json
          echo

          if grep -q '"error"' data.json; then
            echo "Erro retornado pela API ArcGIS:"
            cat data.json
            exit 1
          fi

      - name: Mostrar quantidade de registros
        run: |
          python - <<'PY'
          import json
          with open("data.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          print("Total de features:", len(data.get("features", [])))
          PY

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && exit 0
          git commit -m "Update survey data"
          git push
