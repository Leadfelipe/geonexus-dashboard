name: Update Survey Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

     - name: Buscar dados ArcGIS
  env:
    API_KEY: ${{ secrets.ARCGIS_TOKEN }}
  run: |
    curl -s "https://services3.arcgis.com/ba17q0p2zHwzRK3B/arcgis/rest/services/survey123_08566a11039c49e38326d98785c0ee7e_results/FeatureServer/0/query?where=1%3D1&outFields=*&f=json&token=${API_KEY}&resultRecordCount=2000" -o data.json

    if grep -q '"error"' data.json; then
      echo "Erro retornado pela API ArcGIS:"
      cat data.json
      exit 1
    fi

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && exit 0
          git commit -m "Update survey data"
          git push
